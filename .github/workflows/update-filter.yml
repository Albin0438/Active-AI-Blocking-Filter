name: Update Active AI Blocking Filter

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-filter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create build directory
        run: mkdir -p build

      - name: Download sources
        run: |
          > build/raw.txt
          while read -r url; do
            [[ "$url" =~ ^#.*$ ]] && continue
            [[ -z "$url" ]] && continue
            curl -L --fail --silent "$url" >> build/raw.txt || true
            echo "" >> build/raw.txt
          done < sources/sources.txt

      - name: Add research domains
        run: |
          if [ -f research/ai-domains.txt ]; then
            cat research/ai-domains.txt >> build/raw.txt
          fi

      - name: Clean and normalize
        run: |
          grep -v '^#' build/raw.txt \
          | sed '/^$/d' \
          | tr '[:upper:]' '[:lower:]' \
          | grep -E '^[a-z0-9.-]+$' \
          | sort -u > build/clean.txt

      - name: Apply allowlist
        run: |
          if [ -f blocklists/allowlist.txt ] && [ -s blocklists/allowlist.txt ]; then
            grep -vxFf blocklists/allowlist.txt build/clean.txt > build/tmp.txt || true
            mv build/tmp.txt build/clean.txt
          fi

      - name: Apply denylist
        run: |
          if [ -f blocklists/denylist.txt ]; then
            cat blocklists/denylist.txt >> build/clean.txt
          fi

      - name: Finalize filter
        run: |
          sort -u build/clean.txt > blocklists/active-ai-filter.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blocklists/active-ai-filter.txt
          git diff --cached --quiet || git commit -m "Auto update filter"
          git push
